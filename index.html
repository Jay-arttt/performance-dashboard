<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드별 광고 성과</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fb;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1d23;
  --muted: #8a92a0;
  --meta: #3b7de9;
  --google: #e07b20;
  --ngfa: #00994a;
  --nsa: #0097b8;
  --nbsa: #7c5fc9;
  --kakao: #c4a800;
  --google_app: #d9720f;
  --hyper: #7c5fc9;
  --up: #1a9e52;
  --down: #d93636;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px; }
.page-wrap { max-width: 1200px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
.header h1 { font-family: 'Noto Sans KR', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--muted); margin-top: 4px; }
.date-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.preset-group { display: flex; gap: 4px; }
.date-btn { font-family: 'Inter', sans-serif; font-size: 12px; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
.date-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.date-btn:hover:not(.active) { color: var(--text); border-color: var(--text); }
.date-input-wrap { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 10px; }
.date-input-wrap input[type=date] { font-family: 'Inter', sans-serif; font-size: 12px; border: none; background: transparent; color: var(--text); outline: none; cursor: pointer; color-scheme: dark; }
.date-sep { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); }
.apply-btn { font-family: 'Inter', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; border: none; background: var(--text); color: var(--bg); cursor: pointer; }
.apply-btn:hover { opacity: .75; }

/* Filters */
.filter-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-label { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; min-width: 36px; }
.tab-group { display: flex; gap: 4px; flex-wrap: wrap; }
.tab { display: flex; align-items: center; gap: 7px; padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.tab .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.tab:hover:not(.active) { color: var(--text); border-color: var(--text); }
.subbrand-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 14px; background: rgba(167,139,250,.07); border: 1px solid rgba(167,139,250,.18); border-radius: 10px; flex-wrap: wrap; }
.subbrand-label { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--hyper); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
.sub-tab { padding: 5px 13px; border-radius: 6px; border: 1px solid rgba(167,139,250,.3); background: transparent; color: var(--hyper); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.sub-tab.active { background: var(--hyper); color: var(--bg); border-color: var(--hyper); }
.sub-tab:hover:not(.active) { background: rgba(167,139,250,.12); }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
.kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; transition: border-color .15s; }
.kpi-card:hover { border-color: var(--border2); }
.kpi-label { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.kpi-value { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; font-variant-numeric: tabular-nums; }
.kpi-sub { display: flex; align-items: center; gap: 6px; margin-top: 7px; font-size: 11px; color: var(--muted); }
.badge { font-family: 'Inter', sans-serif; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.badge.up { background: rgba(109,223,154,.12); color: var(--up); }
.badge.down { background: rgba(240,96,96,.12); color: var(--down); }

/* Section title */
.section-title { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

/* Breakdown */
.breakdown-grid { display: grid; gap: 10px; margin-bottom: 20px; }
.ch-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
.ch-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.ch-card[data-ch="meta"]::before { background: var(--meta); }
.ch-card[data-ch="google"]::before { background: var(--google); }
.ch-card[data-ch="ngfa"]::before { background: var(--ngfa); }
.ch-card[data-ch="nsa"]::before { background: var(--nsa); }
.ch-card[data-ch="nbsa"]::before { background: var(--nbsa); }
.ch-card[data-ch="kakao"]::before { background: var(--kakao); }
.ch-card[data-ch="google_app"]::before { background: var(--google_app); }
.ch-name { font-size: 12px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
.ch-name .dot { width: 6px; height: 6px; border-radius: 50%; }
.ch-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ch-metric-label { font-family: 'Inter', sans-serif; font-size: 9px; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 3px; }
.ch-metric-value { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; }

/* Chart section */
.chart-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 20px; position: relative; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.chart-title { font-size: 14px; font-weight: 500; }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Metric selector */
.metric-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.metric-btn { font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.metric-btn:hover:not(.m-disabled) { color: var(--text); }
.metric-btn.m-selected { color: var(--text); }
.metric-btn.m-disabled { opacity: .3; cursor: not-allowed; }
.mbullet { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: .5; }
.metric-btn.m-selected .mbullet { opacity: 1; }
.metric-hint { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); margin-bottom: 14px; }

/* SVG line chart */
.lc-grid line { stroke: rgba(255,255,255,.05); stroke-width: 1; }
.lc-axis-text { font-family: 'Inter', sans-serif; font-size: 8px; fill: var(--muted); font-variant-numeric: tabular-nums; }
.lc-line { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
.lc-dot { stroke-width: 2; cursor: pointer; }

/* Tooltip */
.tip { position: fixed; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 11px; font-family: 'Inter', sans-serif; font-size: 11px; color: var(--text); pointer-events: none; opacity: 0; transition: opacity .12s; white-space: nowrap; z-index: 9999; }

/* ROAS section */
.roas-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.roas-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.roas-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.roas-row:last-child { margin-bottom: 0; }
.roas-ch { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); width: 52px; flex-shrink: 0; }
.roas-bar-wrap { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.roas-bar-fill { height: 100%; border-radius: 3px; transition: width .7s; }
.roas-val { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; width: 44px; text-align: right; flex-shrink: 0; }

/* Table */
.table-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; }
table { width: 100%; border-collapse: collapse; }
thead th { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 9px 14px; text-align: center; border-bottom: 1px solid var(--border); font-weight: 700; background: var(--bg3); transition: color .12s; }
thead th:first-child { text-align: center; }
thead th:hover:not(:first-child) { color: var(--text); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 11px 14px; text-align: right; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
tbody td:first-child { text-align: left; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); }
.ch-pill { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.ch-pill.meta   { background: rgba(79,142,247,.15);  color: var(--meta); }
.ch-pill.google { background: rgba(244,160,68,.15);  color: var(--google); }
.ch-pill.ngfa   { background: rgba(3,199,90,.15);    color: var(--ngfa); }
.ch-pill.nsa    { background: rgba(0,180,216,.15);   color: var(--nsa); }
.ch-pill.nbsa   { background: rgba(167,139,250,.15); color: var(--nbsa); }
.ch-pill.kakao  { background: rgba(249,208,0,.15);   color: var(--kakao); }
.ch-pill.google_app { background: rgba(251,146,60,.15); color: var(--google_app); }

/* Column dropdown */
.col-dropdown-btn { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border-radius:6px; border:1px solid var(--border2); background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:2px; white-space:nowrap; }
.col-dropdown-btn:hover { border-color:var(--text); }
.col-dropdown { position:absolute; right:0; top:calc(100% + 6px); background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:8px; z-index:100; min-width:160px; box-shadow:0 8px 24px rgba(0,0,0,.3); }
.col-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-family:'DM Mono',monospace; font-size:12px; color:var(--text); transition:background .1s; white-space:nowrap; }
.col-item:hover { background:var(--bg3); }
.col-check { width:14px; height:14px; border-radius:3px; border:1px solid var(--border2); background:transparent; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.col-item.col-active .col-check { background:var(--text); border-color:var(--text); }
.col-item.col-active .col-check::after { content:''; display:block; width:8px; height:5px; border-left:1.5px solid var(--bg); border-bottom:1.5px solid var(--bg); transform:rotate(-45deg) translate(1px,-1px); }
.col-item.col-disabled { opacity: .4; cursor: not-allowed; }
.col-item.col-disabled .col-check { opacity: .3; }

.kpi-card { animation: fadeUp .35s ease both; }
.kpi-card:nth-child(1){animation-delay:.03s} .kpi-card:nth-child(2){animation-delay:.06s}
.kpi-card:nth-child(3){animation-delay:.09s} .kpi-card:nth-child(4){animation-delay:.12s}
.kpi-card:nth-child(5){animation-delay:.15s} .kpi-card:nth-child(6){animation-delay:.18s}
.kpi-card:nth-child(7){animation-delay:.21s} .kpi-card:nth-child(8){animation-delay:.24s}
.kpi-card:nth-child(9){animation-delay:.27s} .kpi-card:nth-child(10){animation-delay:.30s}
.kpi-card:nth-child(11){animation-delay:.33s}

/* Budget section */
.budget-section { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:20px; }
.budget-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
.budget-period-selector { display:flex; align-items:center; gap:6px; }
.budget-select { font-family:'DM Mono',monospace; font-size:11px; padding:5px 10px; border-radius:6px; border:1px solid var(--border2); background:var(--bg3); color:var(--text); cursor:pointer; outline:none; }
.budget-title { font-size:14px; font-weight:500; color:var(--text); }
.budget-edit-btn { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border-radius:6px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; }
.budget-edit-btn:hover { color:var(--text); border-color:var(--text); }
.budget-save-btn { font-family:'DM Mono',monospace; font-size:11px; padding:5px 14px; border-radius:6px; border:none; background:var(--text); color:var(--bg); cursor:pointer; margin-top:10px; }
.budget-save-btn:hover { opacity:.8; }
.budget-input-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
.budget-input-item { display:flex; flex-direction:column; gap:4px; }
.budget-input-label { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.5px; }
.budget-input-field { font-family:'DM Mono',monospace; font-size:12px; padding:6px 10px; border-radius:6px; border:1px solid var(--border2); background:var(--bg3); color:var(--text); width:140px; outline:none; }
.budget-input-field:focus { border-color:var(--text); }
.budget-bars { margin-top:4px; }
.budget-row { display:flex; align-items:center; gap:12px; }
.budget-row-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); width:80px; flex-shrink:0; }
.budget-bar-wrap { flex:1; height:8px; background:var(--bg3); border-radius:4px; overflow:hidden; }
.budget-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
.budget-bar-fill.over { background:var(--down); }
.budget-row-nums { font-family:'DM Mono',monospace; font-size:11px; color:var(--text); white-space:nowrap; min-width:200px; text-align:right; }
.budget-row-pct { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; min-width:48px; text-align:right; }
</style>
</head>
<body>

<div id="loadingBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:var(--bg2);border-bottom:1px solid var(--border2);padding:10px 32px;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">
  <div style="width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>
  시트에서 데이터 불러오는 중...
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="page-wrap">
<div class="header">
  <div>
    <h1>브랜드별 광고 성과 대시보드</h1>
    <p id="rangeLabel">2026.02.22 — 2026.03.24</p>
  </div>
  <div class="date-controls">
    <div class="preset-group">
      <button class="date-btn" onclick="setYesterday(this)">어제</button>
      <button class="date-btn" onclick="setLastWeek(this)">지난주</button>
      <button class="date-btn" onclick="setTwoWeeksAgo(this)">지지난주</button>
      <button class="date-btn" onclick="setThisMonth(this)">이번달</button>
      <button class="date-btn" onclick="setLastMonth(this)">지난달</button>
      <button class="date-btn" onclick="setPreset(this,7)">7일</button>
      <button class="date-btn" onclick="setPreset(this,14)">14일</button>
      <button class="date-btn active" onclick="setPreset(this,30)">30일</button>
      <button class="date-btn" onclick="setPreset(this,90)">90일</button>
    </div>
    <div class="date-input-wrap">
      <input type="date" id="dateFrom" value="2026-02-22">
      <span class="date-sep">—</span>
      <input type="date" id="dateTo" value="2026-03-24">
    </div>
    <button class="apply-btn" onclick="applyRange()">적용</button>
  </div>
</div>

<div class="filter-row">
  <span class="filter-label">브랜드</span>
  <div class="tab-group" id="brandTabs">
    <button class="tab active" data-brand="all" onclick="setBrand(this)"><span class="dot" style="background:var(--text);opacity:.25"></span>전체</button>
    <button class="tab" data-brand="skechers" onclick="setBrand(this)"><span class="dot" style="background:#e11d48"></span>스케쳐스</button>
    <button class="tab" data-brand="minoxell" onclick="setBrand(this)"><span class="dot" style="background:#ea580c"></span>마이녹셀</button>
    <button class="tab" data-brand="careerbud" onclick="setBrand(this)"><span class="dot" style="background:#ca8a04"></span>커리어벗</button>
    <button class="tab" data-brand="hyper" onclick="setBrand(this)"><span class="dot" style="background:var(--hyper)"></span>하이퍼</button>
  </div>
</div>

<div class="subbrand-row" id="subRowMynoxcel" style="display:none">
  <span class="subbrand-label">마이녹셀 하위</span>
  <button class="sub-tab active" data-sub="all" onclick="setSub(this,'minoxell')">전체</button>
  <button class="sub-tab" data-sub="minoxell" onclick="setSub(this,'minoxell')">마이녹셀</button>
  <button class="sub-tab" data-sub="oliveyoung" onclick="setSub(this,'minoxell')">올리브영</button>
</div>

<div class="subbrand-row" id="subRowSkechers" style="display:none">
  <span class="subbrand-label">스케쳐스 하위</span>
  <button class="sub-tab active" data-sub="all" onclick="setSub(this,'skechers')">전체</button>
  <button class="sub-tab" data-sub="skechers_official" onclick="setSub(this,'skechers')">공식몰</button>
  <button class="sub-tab" data-sub="skechers_app" onclick="setSub(this,'skechers')">앱</button>
</div>

<div class="subbrand-row" id="subRowHyper" style="display:none">
  <span class="subbrand-label">하이퍼 하위</span>
  <button class="sub-tab active" data-sub="all" onclick="setSub(this,'hyper')">전체</button>
  <button class="sub-tab" data-sub="kitchenaid" onclick="setSub(this,'hyper')">키친에이드</button>
  <button class="sub-tab" data-sub="ecovacs" onclick="setSub(this,'hyper')">에코백스</button>
  <button class="sub-tab" data-sub="anova" onclick="setSub(this,'hyper')">아노바</button>
</div>

<div class="filter-row">
  <span class="filter-label">매체</span>
  <div class="tab-group" id="chTabs">
    <button class="tab active" data-ch="all" onclick="setCh(this)"><span class="dot" style="background:var(--text);opacity:.25"></span>전체</button>
    <button class="tab" data-ch="meta" onclick="setCh(this)"><span class="dot" style="background:var(--meta)"></span>Meta</button>
    <button class="tab" data-ch="google" onclick="setCh(this)"><span class="dot" style="background:var(--google)"></span>Google</button>
    <button class="tab" data-ch="google_app" onclick="setCh(this)"><span class="dot" style="background:var(--google_app)"></span>Google (App)</button>
    <button class="tab" data-ch="kakao" onclick="setCh(this)"><span class="dot" style="background:var(--kakao)"></span>Kakao</button>
    <button class="tab" data-ch="ngfa" onclick="setCh(this)"><span class="dot" style="background:var(--ngfa)"></span>네이버 GFA</button>
    <button class="tab" data-ch="nsa" onclick="setCh(this)"><span class="dot" style="background:var(--nsa)"></span>네이버 SA</button>
    <button class="tab" data-ch="nbsa" onclick="setCh(this)"><span class="dot" style="background:var(--nbsa)"></span>네이버 BSA</button>
  </div>
</div>

<div class="budget-section" id="budgetSection">

var EMPTY = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
var RAW = {

};

// ── Google Sheets CSV 연동 ────────────────────────────────────────────────────
var CSV_URLS = {
  nsa:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRlhITn9rPa816cD0V5rJc15nEh0Z6lrplx4Lzcm1C7byMwKrfMBTndO97sfYOVZV4uas_t-0e0K-Z/pub?gid=1129557155&single=true&output=csv',
  google: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRlhITn9rPa816cD0V5rJc15nEh0Z6lrplx4Lzcm1C7byMwKrfMBTndO97sfYOVZV4uas_t-0e0K-Z/pub?gid=1451184214&single=true&output=csv'
};

var CSV_URLS_MINOXELL = {
  nsa:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGKrM6s-0cb1iLxW_CKAyTgzIljpqB2BsxCb4b-Mr5ZeU8AalPQpAq1LWXeo8kZQlsOKJaaAe766hd/pub?gid=688098510&single=true&output=csv',
  meta: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGKrM6s-0cb1iLxW_CKAyTgzIljpqB2BsxCb4b-Mr5ZeU8AalPQpAq1LWXeo8kZQlsOKJaaAe766hd/pub?gid=1964641815&single=true&output=csv',
  ngfa: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGKrM6s-0cb1iLxW_CKAyTgzIljpqB2BsxCb4b-Mr5ZeU8AalPQpAq1LWXeo8kZQlsOKJaaAe766hd/pub?gid=1678752996&single=true&output=csv'
};

var CSV_URLS_HYPER = {
  nsa:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpuU4aEsm0x1DLxgThPD-iwkGtUPVAC5Pg9-uxoc4R1bjmYzedEwo38vfpH0yQ-HjJa9raxWe0PcYR/pub?gid=1105059263&single=true&output=csv',
  ngfa: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpuU4aEsm0x1DLxgThPD-iwkGtUPVAC5Pg9-uxoc4R1bjmYzedEwo38vfpH0yQ-HjJa9raxWe0PcYR/pub?gid=713595739&single=true&output=csv'
};

var sheetsCache = {};

function showLoading(on) {
  var el = document.getElementById('loadingBanner');
  if (el) el.style.display = on ? 'flex' : 'none';
}

// CSV 문자열 파싱 (따옴표 안 쉼표 처리)
function parseCSV(text) {
  // 셀 안 줄바꿈 제거
  var cleaned = '';
  var inQ = false;
  for (var ci = 0; ci < text.length; ci++) {
    var c = text[ci];
    if (c === '"') { inQ = !inQ; cleaned += c; }
    else if ((c === '\n' || c === '\r') && inQ) { cleaned += ' '; }
    else { cleaned += c; }
  }
  var lines = cleaned.trim().split('\n');
  var headers = splitCSVLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    if (cols.length < 2) continue;
    var row = {};
    for (var j = 0; j < headers.length; j++) row[headers[j]] = cols[j] || '';
    rows.push(row);
  }
  return rows;
}

// CSV 행 → 날짜별 합산 (네이버SA) → {nsa, nbsa} 분리
function aggregateNSA(rows) {
  var nsa = {}, nbsa = {};
  var COL_DATE = '일자';
  var COL_TYPE = '캠페인유형';
  var COL_COST = '총비용(vat-)';
  var COL_IMPR = '노출수';
  var COL_CLICK = '클릭수';
  var COL_CONV = '구매완료 전환수';
  var COL_REV  = '구매완료 매출액';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var dateStr = r[COL_DATE] ? r[COL_DATE].slice(0, 10) : '';
    if (!dateStr) continue;
    var isBSA = (r[COL_TYPE] || '').indexOf('브랜드검색') !== -1;
    var target = isBSA ? nbsa : nsa;
    if (!target[dateStr]) target[dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    target[dateStr].cost        += Number(r[COL_COST])  || 0;
    target[dateStr].impressions += Number(r[COL_IMPR])  || 0;
    target[dateStr].clicks      += Number(r[COL_CLICK]) || 0;
    target[dateStr].conversions += Number(r[COL_CONV])  || 0;
    target[dateStr].revenue     += Number(r[COL_REV])   || 0;
  }
  return {nsa: nsa, nbsa: nbsa};
}

// CSV 행 → 날짜별 합산 (구글DA, mode: 'official' | 'app')
function aggregateGoogleDA(rows, mode) {
  var byDate = {};
  var COL_DATE  = '일자';
  var COL_TYPE  = '캠페인유형';
  var COL_COST  = '총비용(vat-)';
  var COL_IMPR  = '노출수';
  var COL_CLICK = '클릭수';
  var COL_CONV  = '총 구매수';
  var COL_REV   = '총 매출액';
  var COL_APP_AND = '앱설치(Android)';
  var COL_APP_IOS = '앱설치(iOS)';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var type = r[COL_TYPE] || '';
    if (mode === 'app'      && type !== '앱') continue;
    if (mode === 'official' && type === '앱') continue;
    var dateStr = r[COL_DATE] ? r[COL_DATE].slice(0, 10) : '';
    if (!dateStr) continue;
    if (!byDate[dateStr]) byDate[dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    byDate[dateStr].cost        += Number(r[COL_COST])  || 0;
    byDate[dateStr].impressions += Number(r[COL_IMPR])  || 0;
    byDate[dateStr].clicks      += Number(r[COL_CLICK]) || 0;
    byDate[dateStr].revenue     += Number(r[COL_REV])   || 0;
    // 앱 캠페인은 앱설치수, 공식몰은 구매수
    if (mode === 'app') {
      byDate[dateStr].conversions += (Number(r[COL_APP_AND]) || 0) + (Number(r[COL_APP_IOS]) || 0);
    } else {
      byDate[dateStr].conversions += Number(r[COL_CONV]) || 0;
    }
  }
  return byDate;
}

// byDate 객체 → 날짜 범위 합산 → {cost,...}
function sumByDateRange(byDate, dateFrom, dateTo) {
  var out = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
  var keys = Object.keys(byDate);
  for (var i = 0; i < keys.length; i++) {
    var d = keys[i];
    if (d < dateFrom || d > dateTo) continue;
    out.cost        += byDate[d].cost;
    out.revenue     += byDate[d].revenue;
    out.clicks      += byDate[d].clicks;
    out.impressions += byDate[d].impressions;
    out.conversions += byDate[d].conversions;
  }
  return out;
}

function buildSkechersRaw(parsed, dateFrom, dateTo) {
  var empty = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
  return {
    skechers_official: {
      google: sumByDateRange(parsed.googleOfficial, dateFrom, dateTo),
      nsa:    sumByDateRange(parsed.nsa,            dateFrom, dateTo),
      nbsa:   sumByDateRange(parsed.nbsa || {},     dateFrom, dateTo)
    },
    skechers_app: {
      google: sumByDateRange(parsed.googleApp, dateFrom, dateTo),
      nsa:    empty,
      nbsa:   empty
    }
  };
}

function buildSkechersPrev(parsed, dateFrom, dateTo) {
  var f = new Date(dateFrom), t = new Date(dateTo);
  var diff = t - f;
  var prevTo   = new Date(f - 1);
  var prevFrom = new Date(f - diff - 86400000);
  var pf = prevFrom.toISOString().slice(0, 10);
  var pt = prevTo.toISOString().slice(0, 10);
  return buildSkechersRaw(parsed, pf, pt);
}

// 하이퍼 네이버SA: 브랜드 컬럼 + 캠페인유형으로 분리
function aggregateHyperNSA(rows) {
  var out = {}; // { 'kitchenaid__nsa': byDate, 'kitchenaid__nbsa': byDate, ... }
  var BRAND_MAP = {'키친에이드': 'kitchenaid', '에코백스': 'ecovacs', '아노바': 'anova'};

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var dateStr = (r['일자'] || '').slice(0, 10);
    if (!dateStr) continue;
    var brandKr = (r['브랜드'] || '').trim();
    var brKey = BRAND_MAP[brandKr];
    if (!brKey) continue;
    // 키친에이드 중 캠페인명에 '코드리스' 포함되면 별도 키로
    var campName = (r['캠페인명'] || '');
    if (brKey === 'kitchenaid' && campName.indexOf('코드리스') !== -1) {
      brKey = 'kitchenaid_codeless';
    }
    var isBSA = (r['캠페인유형'] || '').indexOf('브랜드검색') !== -1;
    var chKey = isBSA ? 'nbsa' : 'nsa';
    var storageKey = brKey + '__' + chKey;
    if (!out[storageKey]) out[storageKey] = {};
    if (!out[storageKey][dateStr]) out[storageKey][dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    out[storageKey][dateStr].cost        += Number(r['총비용(vat-)'])      || 0;
    out[storageKey][dateStr].impressions += Number(r['노출수'])             || 0;
    out[storageKey][dateStr].clicks      += Number(r['클릭수'])             || 0;
    out[storageKey][dateStr].conversions += Number(r['구매완료 전환수'])     || 0;
    out[storageKey][dateStr].revenue     += Number(r['구매완료 매출액'])     || 0;
  }
  return out;
}

// 하이퍼 네이버DA(GFA): 캠페인명으로 브랜드 구분
function aggregateHyperNGFA(rows) {
  var out = {};
  var BRAND_KEYWORDS = [
    {keyword:'키친에이드', key:'kitchenaid'},
    {keyword:'에코백스',   key:'ecovacs'},
    {keyword:'아노바',     key:'anova'}
  ];

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    // 날짜: '일별' 컬럼, 2026.02.28. 형태
    var rawDate = r['일별'] || '';
    var dateStr = rawDate.replace(/\./g, '-').replace(/-$/, '').slice(0, 10);
    if (!dateStr || dateStr.length < 10) continue;
    var camp = (r['캠페인명'] || '').toLowerCase();
    var brKey = null;
    for (var k = 0; k < BRAND_KEYWORDS.length; k++) {
      if (camp.indexOf(BRAND_KEYWORDS[k].keyword) !== -1) { brKey = BRAND_KEYWORDS[k].key; break; }
    }
    if (!brKey) continue;
    var storageKey = brKey + '__ngfa';
    if (!out[storageKey]) out[storageKey] = {};
    if (!out[storageKey][dateStr]) out[storageKey][dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    out[storageKey][dateStr].cost        += Number((r['총비용(vat-)']      || '').replace(/,/g,'')) || 0;
    out[storageKey][dateStr].impressions += Number((r['노출수']             || '').replace(/,/g,'')) || 0;
    out[storageKey][dateStr].clicks      += Number((r['클릭수']             || '').replace(/,/g,'')) || 0;
    out[storageKey][dateStr].conversions += Number((r['구매완료 전환수']     || '').replace(/,/g,'')) || 0;
    out[storageKey][dateStr].revenue     += Number((r['구매완료 매출액']     || '').replace(/,/g,'')) || 0;
  }
  return out;
}

function loadHyper(callback) {
  if (sheetsCache.hyper) { callback(sheetsCache.hyper); return; }
  showLoading(true);
  Promise.all([
    fetch(CSV_URLS_HYPER.nsa).then(function(r){ return r.text(); }),
    fetch(CSV_URLS_HYPER.ngfa).then(function(r){ return r.text(); })
  ])
  .then(function(results) {
    var nsaData  = aggregateHyperNSA(parseCSV(results[0]));
    var ngfaData = aggregateHyperNGFA(parseCSV(results[1]));
    // 합치기
    var parsed = {};
    var keys = Object.keys(nsaData).concat(Object.keys(ngfaData));
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      if (!parsed[k]) parsed[k] = {};
      var src = nsaData[k] || ngfaData[k];
      var dates = Object.keys(src);
      for (var j = 0; j < dates.length; j++) {
        parsed[k][dates[j]] = src[dates[j]];
      }
    }
    sheetsCache.hyper = parsed;
    showLoading(false);
    callback(parsed);
  })
  .catch(function(err) {
    showLoading(false);
    console.error('하이퍼 Sheets 로드 실패:', err);
    callback(null);
  });
}

function loadSkechers(callback) {
  if (sheetsCache.skechers) { callback(sheetsCache.skechers); return; }
  showLoading(true);

  var nsaPromise    = fetch(CSV_URLS.nsa).then(function(r) { return r.text(); });
  var googlePromise = fetch(CSV_URLS.google).then(function(r) { return r.text(); });

  Promise.all([nsaPromise, googlePromise])
    .then(function(results) {
      var nsaResult  = aggregateNSA(parseCSV(results[0]));
      var googleRows = parseCSV(results[1]);
      var parsed = {
        nsa:            nsaResult.nsa,
        nbsa:           nsaResult.nbsa,
        googleOfficial: aggregateGoogleDA(googleRows, 'official'),
        googleApp:      aggregateGoogleDA(googleRows, 'app')
      };
      sheetsCache.skechers = parsed;
      showLoading(false);
      callback(parsed);
    })
    .catch(function(err) {
      showLoading(false);
      console.error('Sheets 로드 실패:', err);
      callback(null);
    });
}

// 공통 날짜별 집계 함수 (네이버SA/GFA/Meta 공용)
function aggregateGeneric(rows) {
  var byDate = {};
  var COL_DATE = '일자';
  var COL_COST = '총비용(vat-)';
  var COL_IMPR = '노출수';
  var COL_CLICK = '클릭수';
  var COL_CONV = '구매완료 전환수';
  var COL_REV  = '구매완료 매출액';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var dateStr = r[COL_DATE] ? r[COL_DATE].slice(0, 10) : '';
    if (!dateStr) continue;
    if (!byDate[dateStr]) byDate[dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    byDate[dateStr].cost        += Number(r[COL_COST])  || 0;
    byDate[dateStr].impressions += Number(r[COL_IMPR])  || 0;
    byDate[dateStr].clicks      += Number(r[COL_CLICK]) || 0;
    byDate[dateStr].conversions += Number(r[COL_CONV])  || 0;
    byDate[dateStr].revenue     += Number(r[COL_REV])   || 0;
  }
  return byDate;
}

// GFA 전용: 일자 컬럼이 중복이고 날짜 형식이 2026.01.01. 형태
// 광고그룹명에 '올리브영' 포함 시 oliveyoung으로 분리
function aggregateGFA(rows) {
  var minoxell = {};
  var oliveyoung = {};

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var rawDate = r['일별'] || '';
    var dateStr = rawDate.replace(/\./g, '-').replace(/-$/, '').slice(0, 10);
    if (!dateStr || dateStr.length < 10) continue;

    var isOlive = (r['광고그룹명'] || '').indexOf('올리브영') !== -1;
    var target = isOlive ? oliveyoung : minoxell;

    if (!target[dateStr]) target[dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
    target[dateStr].cost        += Number(r['총비용(vat-)'])      || 0;
    target[dateStr].impressions += Number(r['노출수'])             || 0;
    target[dateStr].clicks      += Number(r['클릭수'])             || 0;
    target[dateStr].conversions += Number(r['구매완료 전환수'])     || 0;
    target[dateStr].revenue     += Number(r['구매완료 매출액'])     || 0;
  }
  return {minoxell: minoxell, oliveyoung: oliveyoung};
}

function loadMinoxell(callback) {
  if (sheetsCache.minoxell) { callback(sheetsCache.minoxell); return; }
  showLoading(true);

  Promise.all([
    fetch(CSV_URLS_MINOXELL.nsa).then(function(r){ return r.text(); }),
    fetch(CSV_URLS_MINOXELL.meta).then(function(r){ return r.text(); }),
    fetch(CSV_URLS_MINOXELL.ngfa).then(function(r){ return r.text(); })
  ])
  .then(function(results) {
    var nsaResult2 = aggregateNSA(parseCSV(results[0]));
    var gfaResult  = aggregateGFA(parseCSV(results[2]));
    var parsed = {
      nsa:             nsaResult2.nsa,
      nbsa:            nsaResult2.nbsa,
      meta:            aggregateGeneric(parseCSV(results[1])),
      ngfa:            gfaResult.minoxell,
      oliveyoung_ngfa: gfaResult.oliveyoung
    };
    sheetsCache.minoxell = parsed;
    showLoading(false);
    callback(parsed);
  })
  .catch(function(err) {
    showLoading(false);
    console.error('마이녹셀 Sheets 로드 실패:', err);
    callback(null);
  });
}

function applyHyper(apiData, dateFrom, dateTo) {
  if (!apiData) return;
  var prevRange = getPrevRange(dateFrom, dateTo);
  var HYPER_BRANDS = ['kitchenaid', 'ecovacs', 'anova'];
  var HYPER_CHS    = ['nsa', 'nbsa', 'ngfa'];
  for (var bi = 0; bi < HYPER_BRANDS.length; bi++) {
    var br = HYPER_BRANDS[bi];
    if (!RAW[br]) RAW[br] = {};
    if (!PREV[br]) PREV[br] = {};
    for (var ci = 0; ci < HYPER_CHS.length; ci++) {
      var ch = HYPER_CHS[ci];
      var key = br + '__' + ch;
      var byDate = apiData[key] || {};
      RAW[br][ch]  = sumByDateRange(byDate, dateFrom, dateTo);
      PREV[br][ch] = sumByDateRange(byDate, prevRange.from, prevRange.to);
    }
  }
}

function applyMinoxell(apiData, dateFrom, dateTo) {
  if (!apiData) return;
  var prevRange = getPrevRange(dateFrom, dateTo);
  RAW.minoxell = {
    meta:   sumByDateRange(apiData.meta,       dateFrom, dateTo),
    nsa:    sumByDateRange(apiData.nsa,        dateFrom, dateTo),
    nbsa:   sumByDateRange(apiData.nbsa || {}, dateFrom, dateTo),
    ngfa:   sumByDateRange(apiData.ngfa,       dateFrom, dateTo)
  };
  RAW.oliveyoung = {
    meta:   RAW.oliveyoung ? RAW.oliveyoung.meta : {cost:0, revenue:0, clicks:0, impressions:0, conversions:0},
    ngfa:   sumByDateRange(apiData.oliveyoung_ngfa, dateFrom, dateTo)
  };
  PREV.minoxell = {
    meta:   sumByDateRange(apiData.meta,       prevRange.from, prevRange.to),
    nsa:    sumByDateRange(apiData.nsa,        prevRange.from, prevRange.to),
    nbsa:   sumByDateRange(apiData.nbsa || {}, prevRange.from, prevRange.to),
    ngfa:   sumByDateRange(apiData.ngfa,       prevRange.from, prevRange.to)
  };
  PREV.oliveyoung = {
    meta:   PREV.oliveyoung ? PREV.oliveyoung.meta : {cost:0, revenue:0, clicks:0, impressions:0, conversions:0},
    ngfa:   sumByDateRange(apiData.oliveyoung_ngfa, prevRange.from, prevRange.to)
  };
}

function applySkechers(apiData, dateFrom, dateTo) {
  if (!apiData) return;
  var built = buildSkechersRaw(apiData, dateFrom, dateTo);
  RAW.skechers_official = built.skechers_official;
  RAW.skechers_app      = built.skechers_app;
  var prev = buildSkechersPrev(apiData, dateFrom, dateTo);
  PREV.skechers_official = prev.skechers_official;
  PREV.skechers_app      = prev.skechers_app;
}

// render 오버라이드: 실제 데이터 브랜드면 API 호출
function renderWithData() {
  var needsSkechers = (S.brand === 'skechers' || S.brand === 'all');
  var needsMinoxell = (S.brand === 'minoxell' || S.brand === 'all');
  var needsHyper    = (S.brand === 'hyper'    || S.brand === 'all');

  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;

  if (!needsSkechers && !needsMinoxell && !needsHyper) { render(); return; }

  var tasks = [];
  if (needsSkechers) tasks.push(new Promise(function(res) { loadSkechers(function(d){ applySkechers(d, dateFrom, dateTo); res(); }); }));
  if (needsMinoxell) tasks.push(new Promise(function(res) { loadMinoxell(function(d){ applyMinoxell(d, dateFrom, dateTo); res(); }); }));
  if (needsHyper)    tasks.push(new Promise(function(res) { loadHyper(function(d){ applyHyper(d, dateFrom, dateTo); res(); }); }));

  Promise.all(tasks).then(function() { render(); });
}

function getPrevRange(dateFrom, dateTo) {
  var f = new Date(dateFrom), t = new Date(dateTo);
  var diff = t - f;
  var prevTo   = new Date(f - 1);
  var prevFrom = new Date(f - diff - 86400000);
  return { from: prevFrom.toISOString().slice(0,10), to: prevTo.toISOString().slice(0,10) };
}

// 브랜드 × 채널 × 날짜별 1일 데이터 반환
function getDayData(brKey, chKey, dateStr) {
  var empty = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
  // 스케쳐스 실제 데이터
  if (sheetsCache.skechers) {
    var p = sheetsCache.skechers;
    var byDate = null;
    if (brKey === 'skechers_official' && chKey === 'nsa')    byDate = p.nsa;
    if (brKey === 'skechers_official' && chKey === 'nbsa')   byDate = p.nbsa;
    if (brKey === 'skechers_official' && chKey === 'google') byDate = p.googleOfficial;
    if (brKey === 'skechers_app'      && chKey === 'google') byDate = p.googleApp;
    if (byDate && byDate[dateStr]) return byDate[dateStr];
    if (byDate) return empty;
  }
  // 마이녹셀 실제 데이터
  if (sheetsCache.minoxell) {
    var pm = sheetsCache.minoxell;
    var byDateM = null;
    if (brKey === 'minoxell' && chKey === 'nsa')  byDateM = pm.nsa;
    if (brKey === 'minoxell' && chKey === 'nbsa') byDateM = pm.nbsa;
    if (brKey === 'minoxell' && chKey === 'meta') byDateM = pm.meta;
    if (brKey === 'minoxell' && chKey === 'ngfa') byDateM = pm.ngfa;
    if (brKey === 'oliveyoung' && chKey === 'ngfa') byDateM = pm.oliveyoung_ngfa;
    if (byDateM && byDateM[dateStr]) return byDateM[dateStr];
    if (byDateM) return empty;
  }
  // 하이퍼 실제 데이터
  if (sheetsCache.hyper) {
    var key = brKey + '__' + chKey;
    var byDateH = sheetsCache.hyper[key];
    if (byDateH && byDateH[dateStr]) return byDateH[dateStr];
    if (byDateH) return empty;
  }
  // 샘플 데이터 브랜드: RAW 합산값을 날짜 수로 나눠서 근사
  if (RAW[brKey] && RAW[brKey][chKey]) return empty; // 샘플은 일별 없음
  return empty;
}

function brandKeys() {
  if (S.brand === 'all') return ALL_BRANDS;
  if (S.brand === 'hyper')    return S.sub === 'all' ? HYPER_SUBS    : [S.sub];
  if (S.brand === 'skechers') return S.sub === 'all' ? SKECHERS_SUBS : [S.sub];
  if (S.brand === 'minoxell') return S.sub === 'all' ? MYNOXCEL_SUBS : [S.sub];
  return [S.brand];
}

function chKeys() {
  if (S.ch.indexOf('all') !== -1) return CHS;
  return S.ch.length > 0 ? S.ch : CHS;
}

function sumData(bk, ck, dataset) {
  var out = {};
  for (var ci = 0; ci < ck.length; ci++) {
    var c = ck[ci];
    out[c] = {cost: 0, revenue: 0, clicks: 0, impressions: 0, conversions: 0};
    for (var bi = 0; bi < bk.length; bi++) {
      var b = bk[bi];
      if (!dataset[b] || !dataset[b][c]) continue;
      var d = dataset[b][c];
      out[c].cost        += d.cost;
      out[c].revenue     += d.revenue;
      out[c].clicks      += d.clicks;
      out[c].impressions += d.impressions;
      out[c].conversions += d.conversions;
    }
  }
  return out;
}

function calc(d) {
  return {
    cost:        d.cost,
    revenue:     d.revenue,
    roas:        d.revenue / d.cost,
    cvr:         d.conversions / d.clicks,
    clicks:      d.clicks,
    cpc:         d.cost / d.clicks,
    ctr:         d.clicks / d.impressions,
    impressions: d.impressions,
    cpm:         d.cost / d.impressions * 1000,
    conversions: d.conversions,
    cpa:         d.conversions > 0 ? d.cost / d.conversions : 0
  };
}

function aggCalc(map) {
  var s = {cost: 0, revenue: 0, clicks: 0, impressions: 0, conversions: 0};
  var keys = Object.keys(map);
  for (var i = 0; i < keys.length; i++) {
    var d = map[keys[i]];
    s.cost        += d.cost;
    s.revenue     += d.revenue;
    s.clicks      += d.clicks;
    s.impressions += d.impressions;
    s.conversions += d.conversions;
  }
  var result = calc(s);
  result.cpa = s.conversions > 0 ? s.cost / s.conversions : 0;
  return result;
}

function fmt(n, t) {
  if (t === 'won')  return '₩' + Math.round(n).toLocaleString('ko-KR');
  if (t === 'pct')  return (n * 100).toFixed(2) + '%';
  if (t === 'roas') return (n * 100).toFixed(0) + '%';
  if (t === 'x')    return n.toFixed(2) + 'x';
  if (t === 'num')  return Math.round(n).toLocaleString('ko-KR');
  if (t === 'cpc')  return '₩' + Math.round(n).toLocaleString('ko-KR');
  return String(n);
}

function renderKPIs(cm, pm) {
  var ca = aggCalc(cm);
  var pa = aggCalc(pm);
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;

  // 사용할 KPI 목록 결정 (kpiOrder 있으면 해당 순서 사용)
  var kpiList;
  if (override && override.kpiOrder) {
    var kpiMap = {};
    for (var mi = 0; mi < KPIS.length; mi++) kpiMap[KPIS[mi].key] = KPIS[mi];
    kpiList = [];
    for (var oi = 0; oi < override.kpiOrder.length; oi++) {
      if (kpiMap[override.kpiOrder[oi]]) kpiList.push(kpiMap[override.kpiOrder[oi]]);
    }
  } else {
    kpiList = KPIS.filter(function(k) {
      return !(override && override.excludeCols && override.excludeCols.indexOf(k.key) !== -1);
    });
  }

  // 그리드 열 수: 5열 기준, 커리어벗은 9개 → 5+4
  var colCount = override && override.kpiOrder ? 5 : 6;
  document.getElementById('kpiGrid').style.gridTemplateColumns = 'repeat(' + colCount + ', 1fr)';

  var html = '';
  for (var i = 0; i < kpiList.length; i++) {
    var k = kpiList[i];
    var label = (override && override.labelOverrides && override.labelOverrides[k.key]) ? override.labelOverrides[k.key] : k.label;
    var v = ca[k.key];
    var p = pa[k.key];
    var chg = (v - p) / p;
    var isUp = chg >= 0;
    var isCostMetric = (k.key === 'cost' || k.key === 'cpc' || k.key === 'cpm' || k.key === 'cpa');
    var isGood = isCostMetric ? !isUp : isUp;
    html += '<div class="kpi-card">';
    html += '<div class="kpi-label">' + label + '</div>';
    html += '<div class="kpi-value">' + fmt(v, k.type) + '</div>';
    html += '<div class="kpi-sub">';
    html += '<span class="badge ' + (isGood ? 'up' : 'down') + '">' + (isUp ? '+' : '') + (chg * 100).toFixed(1) + '%</span>';
    html += '<span style="color:var(--text);opacity:.55;letter-spacing:0.03em">' + fmt(p, k.type) + '</span>';
    html += '</div></div>';
  }
  document.getElementById('kpiGrid').innerHTML = html;
}

function buildMetricSelector() {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  // auto-remove excluded metrics from selection
  if (override && override.excludeCols) {
    for (var xi = 0; xi < override.excludeCols.length; xi++) {
      var exKey = override.excludeCols[xi];
      var exIdx = selectedMetrics.indexOf(exKey);
      if (exIdx !== -1) selectedMetrics.splice(exIdx, 1);
    }
    if (selectedMetrics.length === 0) selectedMetrics = ['cost'];
  }
  var html = '';
  for (var i = 0; i < CHART_METRICS.length; i++) {
    var m = CHART_METRICS[i];
    var isExcluded = override && override.excludeCols && override.excludeCols.indexOf(m.key) !== -1;
    if (isExcluded) continue;
    var label = (override && override.labelOverrides && override.labelOverrides[m.key]) ? override.labelOverrides[m.key] : m.label;
    var isSel = selectedMetrics.indexOf(m.key) !== -1;
    var isDis = !isSel && selectedMetrics.length >= 3;
    var cls = 'metric-btn' + (isSel ? ' m-selected' : '') + (isDis ? ' m-disabled' : '');
    var style = isSel ? 'background:' + m.color + '20;border-color:' + m.color + ';' : '';
    html += '<button class="' + cls + '" style="' + style + '" onclick="toggleMetric(\'' + m.key + '\')">';
    html += '<span class="mbullet" style="background:' + m.color + '"></span>' + label;
    html += '</button>';
  }
  document.getElementById('metricSelector').innerHTML = html;
  var hint = document.getElementById('metricHint');
  if (selectedMetrics.length >= 3) {
    hint.textContent = '최대 3개 선택됨 — 다른 지표를 보려면 선택 해제하세요';
  } else {
    hint.textContent = '최대 3개 지표 선택 가능 (현재 ' + selectedMetrics.length + '개)';
  }
}

function toggleMetric(key) {
  var idx = selectedMetrics.indexOf(key);
  if (idx !== -1) {
    if (selectedMetrics.length === 1) return;
    selectedMetrics.splice(idx, 1);
  } else {
    if (selectedMetrics.length >= 3) return;
    selectedMetrics.push(key);
  }
  buildMetricSelector();
  var bk = brandKeys();
  var ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  renderChart(cm, ck);
}

function renderChart(cm, ck) {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  var activeMets = [];
  for (var i = 0; i < CHART_METRICS.length; i++) {
    if (selectedMetrics.indexOf(CHART_METRICS[i].key) !== -1) {
      var m = CHART_METRICS[i];
      var label = (override && override.labelOverrides && override.labelOverrides[m.key]) ? override.labelOverrides[m.key] : m.label;
      activeMets.push({key: m.key, label: label, type: m.type, color: m.color});
    }
  }

  // Legend
  var legHtml = '';
  for (var i = 0; i < activeMets.length; i++) {
    legHtml += '<div class="legend-item"><div class="legend-dot" style="background:' + activeMets[i].color + '"></div>' + activeMets[i].label + '</div>';
  }
  if (prevWeekMode) {
    legHtml += '<div class="legend-item" style="opacity:.6"><div style="width:16px;height:1px;border-top:2px dashed #aaa;margin-right:6px"></div>동기간</div>';
  }
  document.getElementById('chartLegend').innerHTML = legHtml;

  // 날짜 범위에서 일별 날짜 배열 생성
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;
  var DAYS = [];
  var d = new Date(dateFrom);
  var dEnd = new Date(dateTo);
  while (d <= dEnd) {
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    DAYS.push(mm + '/' + dd);
    d.setDate(d.getDate() + 1);
  }

  // Build daily series per metric (실제 날짜별 raw 데이터에서 합산)
  var series = [];
  for (var mi = 0; mi < activeMets.length; mi++) {
    var metKey = activeMets[mi].key;
    var vals = [];
    for (var di = 0; di < DAYS.length; di++) {
      var dStr = new Date(dateFrom);
      dStr.setDate(dStr.getDate() + di);
      var dKey = dStr.toISOString().slice(0, 10);

      var s = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
      for (var ci = 0; ci < ck.length; ci++) {
        var chKey = ck[ci];
        var bk2 = brandKeys();
        for (var bi2 = 0; bi2 < bk2.length; bi2++) {
          var brKey = bk2[bi2];
          var dayData = getDayData(brKey, chKey, dKey);
          s.cost        += dayData.cost;
          s.revenue     += dayData.revenue;
          s.clicks      += dayData.clicks;
          s.impressions += dayData.impressions;
          s.conversions += dayData.conversions;
        }
      }
      vals.push(calc(s)[metKey] || 0);
    }
    series.push({meta: activeMets[mi], values: vals, isPrev: false});
  }

  // 전주 비교 시리즈 추가
  if (prevWeekMode) {
    var prevDays = [];
    for (var di = 0; di < DAYS.length; di++) {
      var pd = new Date(dateFrom);
      pd.setDate(pd.getDate() + di - 7);
      prevDays.push(pd.toISOString().slice(0, 10));
    }
    for (var mi = 0; mi < activeMets.length; mi++) {
      var metKey2 = activeMets[mi].key;
      var pvals = [];
      for (var di = 0; di < prevDays.length; di++) {
        var ps = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
        for (var ci = 0; ci < ck.length; ci++) {
          var chKey2 = ck[ci];
          var bk3 = brandKeys();
          for (var bi3 = 0; bi3 < bk3.length; bi3++) {
            var dayData2 = getDayData(bk3[bi3], chKey2, prevDays[di]);
            ps.cost        += dayData2.cost;
            ps.revenue     += dayData2.revenue;
            ps.clicks      += dayData2.clicks;
            ps.impressions += dayData2.impressions;
            ps.conversions += dayData2.conversions;
          }
        }
        pvals.push(calc(ps)[metKey2] || 0);
      }
      series.push({
        meta: {key: activeMets[mi].key, label: '전주 ' + activeMets[mi].label, type: activeMets[mi].type, color: 'rgba(160,160,160,0.7)'},
        values: pvals,
        isPrev: true
      });
    }
  }

  // 지표 타입 분류 (전주 제외하고 현재 데이터만 Y축 기준)
  var PCT_TYPES  = ['pct', 'roas'];
  var curSeries   = series.filter(function(s){ return !s.isPrev; });
  var leftSeries  = curSeries.filter(function(s){ return PCT_TYPES.indexOf(s.meta.type) === -1; });
  var rightSeries = curSeries.filter(function(s){ return PCT_TYPES.indexOf(s.meta.type) !== -1; });

  // Y축 범위 계산
  function seriesMinMax(arr) {
    var mn = Infinity, mx = -Infinity;
    for (var i = 0; i < arr.length; i++) {
      for (var j = 0; j < arr[i].values.length; j++) {
        if (arr[i].values[j] < mn) mn = arr[i].values[j];
        if (arr[i].values[j] > mx) mx = arr[i].values[j];
      }
    }
    return {min: mn === Infinity ? 0 : mn, max: mx === -Infinity ? 1 : mx};
  }
  function niceMax(v) {
    if (v === 0) return 1;
    var mag = Math.pow(10, Math.floor(Math.log(v) / Math.LN10));
    return Math.ceil(v / mag) * mag;
  }

  var lRange = leftSeries.length  ? seriesMinMax(leftSeries)  : null;
  var rRange = rightSeries.length ? seriesMinMax(rightSeries) : null;
  var lMax = lRange ? niceMax(lRange.max) : 0;
  var rMax = rRange ? niceMax(rRange.max) : 0;

  // 각 시리즈 정규화 (각자의 축 기준)
  var normed = [];
  for (var i = 0; i < series.length; i++) {
    var vs = series[i].values;
    var isPct = PCT_TYPES.indexOf(series[i].meta.type) !== -1;
    var axMax = isPct ? rMax : lMax;
    var n = [];
    for (var j = 0; j < vs.length; j++) n.push(axMax > 0 ? vs[j] / axMax : 0);
    normed.push(n);
  }

  var N = DAYS.length;
  var W = 620, H = 200;
  var PL = lRange ? 64 : 16;
  var PR = rRange ? 56 : 16;
  var PT = 14, PB = 28;
  var cW = W - PL - PR;
  var cH = H - PT - PB;

  function xp(i) { return N > 1 ? PL + (i / (N - 1)) * cW : PL + cW / 2; }
  function yp(n) { return PT + (1 - Math.min(n, 1)) * cH; }

  // Y축 눈금 포맷
  function fmtAxis(v, type) {
    if (type === 'pct') return (v * 100).toFixed(1) + '%';
    if (type === 'roas') return (v * 100).toFixed(0) + '%';
    return Math.round(v).toLocaleString('ko-KR');
  }

  var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible;display:block">';

  // Grid + Y축 눈금
  svg += '<g>';
  var TICKS = 4;
  for (var g = 0; g <= TICKS; g++) {
    var gy = PT + (g / TICKS) * cH;
    svg += '<line x1="' + PL + '" y1="' + gy + '" x2="' + (W - PR) + '" y2="' + gy + '" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>';
    var ratio = 1 - g / TICKS;
    // 왼쪽 Y축
    if (lRange) {
      var lVal = ratio * lMax;
      var lType = leftSeries.length ? leftSeries[0].meta.type : 'num';
      svg += '<text x="' + (PL - 6) + '" y="' + (gy + 4) + '" text-anchor="end" class="lc-axis-text" style="fill:rgba(0,0,0,0.4);font-size:7px">' + fmtAxis(lVal, lType) + '</text>';
    }
    // 오른쪽 Y축
    if (rRange) {
      var rVal = ratio * rMax;
      var rType = rightSeries.length ? rightSeries[0].meta.type : 'pct';
      svg += '<text x="' + (W - PR + 6) + '" y="' + (gy + 4) + '" text-anchor="start" class="lc-axis-text" style="fill:rgba(0,0,0,0.4);font-size:7px">' + fmtAxis(rVal, rType) + '</text>';
    }
  }
  svg += '</g>';

  // X 날짜 레이블 (날짜 수에 따라 간격 조정)
  var step = N <= 14 ? 1 : N <= 31 ? Math.ceil(N / 8) : Math.ceil(N / 10);
  for (var i = 0; i < DAYS.length; i++) {
    if (i % step !== 0 && i !== DAYS.length - 1) continue;
    svg += '<text x="' + xp(i) + '" y="' + (H - 4) + '" text-anchor="middle" class="lc-axis-text">' + DAYS[i] + '</text>';
  }

  // Series
  for (var si = 0; si < series.length; si++) {
    var col = series[si].meta.color;
    var pts = normed[si];
    var coords = [];
    for (var i = 0; i < N; i++) coords.push([xp(i), yp(pts[i])]);
    var isPrevSeries = series[si].isPrev;

    // Area (전주는 없음)
    if (!isPrevSeries) {
      var aD = 'M ' + coords[0][0] + ' ' + yp(0);
      for (var i = 0; i < N; i++) aD += ' L ' + coords[i][0] + ' ' + coords[i][1];
      aD += ' L ' + coords[N-1][0] + ' ' + yp(0) + ' Z';
      svg += '<path d="' + aD + '" fill="' + col + '" opacity="0.08"/>';
    }

    // Line (직선)
    var lD = 'M ' + coords[0][0] + ' ' + coords[0][1];
    for (var i = 1; i < N; i++) {
      lD += ' L ' + coords[i][0] + ' ' + coords[i][1];
    }
    var dashAttr = isPrevSeries ? ' stroke-dasharray="4,3"' : '';
    svg += '<path d="' + lD + '" fill="none" stroke="' + col + '" stroke-width="0.5"' + dashAttr + ' stroke-linejoin="round" stroke-linecap="round"/>';

    // Dots
    var showDots = N <= 31;
    var mLabel = series[si].meta.label;
    var mType  = series[si].meta.type;
    var mVals  = series[si].values;
    for (var i = 0; i < N; i++) {
      var tipTxt = (mLabel + ': ' + fmt(mVals[i], mType) + ' (' + DAYS[i] + ')').replace(/'/g, '&#39;');
      if (showDots) {
        svg += '<circle cx="' + coords[i][0] + '" cy="' + coords[i][1] + '" r="3" fill="' + col + '" stroke="#ffffff" stroke-width="1.5" style="cursor:pointer" onmouseenter="showTip(event,\'' + tipTxt + '\')" onmouseleave="hideTip()"/>';
      } else {
        svg += '<circle cx="' + coords[i][0] + '" cy="' + coords[i][1] + '" r="6" fill="transparent" style="cursor:pointer" onmouseenter="showTip(event,\'' + tipTxt + '\')" onmouseleave="hideTip()"/>';
      }
    }
  }

  svg += '</svg>';
  document.getElementById('lineChartWrap').innerHTML = svg;
}

function showTip(e, text) {
  var tip = document.getElementById('tip');
  tip.textContent = text;
  tip.style.opacity = '1';
  var x = e.clientX + 14;
  var y = e.clientY - 32;
  // 화면 오른쪽 벗어나면 왼쪽으로
  if (x + 200 > window.innerWidth) x = e.clientX - 14 - tip.offsetWidth;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() {
  document.getElementById('tip').style.opacity = '0';
}

var TABLE_COLS = [
  {key:'cost',        label:'비용',   type:'won'},
  {key:'revenue',     label:'매출',   type:'won'},
  {key:'roas',        label:'ROAS',   type:'roas'},
  {key:'conversions', label:'전환수', type:'num'},
  {key:'cpa',         label:'CPA',    type:'cpc'},
  {key:'cvr',         label:'CVR',    type:'pct'},
  {key:'clicks',      label:'클릭',   type:'num'},
  {key:'cpc',         label:'CPC',    type:'cpc'},
  {key:'ctr',         label:'CTR',    type:'pct'},
  {key:'impressions', label:'노출',   type:'num'},
  {key:'cpm',         label:'CPM',    type:'cpc'}
];
var selectedCols = ['cost','revenue','roas','conversions','cpa','cvr','clicks','cpc','ctr','impressions','cpm'];

function buildColDropdown() {
  var html = '';
  for (var i = 0; i < TABLE_COLS.length; i++) {
    var col = TABLE_COLS[i];
    var active = selectedCols.indexOf(col.key) !== -1;
    html += '<div class="col-item ' + (active ? 'col-active' : '') + '" onclick="toggleCol(\'' + col.key + '\')">';
    html += '<div class="col-check"></div>' + col.label + '</div>';
  }
  document.getElementById('colDropdown').innerHTML = html;
  document.getElementById('colCount').textContent = '(' + selectedCols.length + '/' + TABLE_COLS.length + ')';
}

function toggleColDrop() {
  var dd = document.getElementById('colDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.table-header')) {
    document.getElementById('colDropdown').style.display = 'none';
  }
});

function toggleCol(key) {
  var idx = selectedCols.indexOf(key);
  if (idx !== -1) {
    if (selectedCols.length === 1) return;
    selectedCols.splice(idx, 1);
  } else {
    selectedCols.push(key);
    selectedCols.sort(function(a, b) {
      var ai = TABLE_COLS.findIndex(function(c){return c.key===a;});
      var bi = TABLE_COLS.findIndex(function(c){return c.key===b;});
      return ai - bi;
    });
  }
  buildColDropdown();
  var bk = brandKeys(), ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  renderTable(cm, ck);
}

// 브랜드별 컬럼/레이블 오버라이드
var BRAND_OVERRIDES = {
  careerbud: {
    excludeCols: ['revenue', 'roas'],
    labelOverrides: {conversions: '회원가입', cpa: 'CPA', cvr: 'CVR'},
    kpiOrder: ['cost', 'conversions', 'cvr', 'cpa', 'clicks', 'ctr', 'cpc', 'impressions', 'cpm']
  },
  skechers_app: {
    labelOverrides: {conversions: '앱설치수', cpa: 'CPI', cvr: '설치율'}
  }
};

function getActiveBrand() {
  if (S.brand === 'careerbud') return 'careerbud';
  if (S.brand === 'skechers' && S.sub === 'skechers_app') return 'skechers_app';
  return null;
}

function getEffectiveCols() {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  return TABLE_COLS.filter(function(c) {
    if (selectedCols.indexOf(c.key) === -1) return false;
    if (override && override.excludeCols && override.excludeCols.indexOf(c.key) !== -1) return false;
    return true;
  }).map(function(c) {
    if (override && override.labelOverrides && override.labelOverrides[c.key]) {
      return {key: c.key, label: override.labelOverrides[c.key], type: c.type};
    }
    return c;
  });
}

var tableSort = {key: null, asc: true};

function calcExtended(d) {
  var base = calc(d);
  base.cpa = d.conversions > 0 ? d.cost / d.conversions : 0;
  return base;
}

function buildColDropdown() {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  var html = '';
  for (var i = 0; i < TABLE_COLS.length; i++) {
    var col = TABLE_COLS[i];
    var isExcluded = override && override.excludeCols && override.excludeCols.indexOf(col.key) !== -1;
    var label = (override && override.labelOverrides && override.labelOverrides[col.key]) ? override.labelOverrides[col.key] : col.label;
    var active = selectedCols.indexOf(col.key) !== -1;
    var cls = 'col-item' + (active ? ' col-active' : '') + (isExcluded ? ' col-disabled' : '');
    var title = isExcluded ? ' title="' + S.brand + ' 브랜드에서 사용 안 함"' : '';
    html += '<div class="' + cls + '"' + title + ' onclick="' + (isExcluded ? '' : 'toggleCol(\'' + col.key + '\')') + '">';
    html += '<div class="col-check"></div>' + label + (isExcluded ? ' <span style="opacity:.4;font-size:10px">제외</span>' : '') + '</div>';
  }
  document.getElementById('colDropdown').innerHTML = html;
  var visibleCount = getEffectiveCols().length;
  document.getElementById('colCount').textContent = '(' + visibleCount + ')';
}

function renderTable(cm, ck) {
  var activeCols = getEffectiveCols();

  // thead
  var headHtml = '<th style="cursor:default">매체</th>';
  for (var i = 0; i < activeCols.length; i++) {
    var col = activeCols[i];
    var isSort = tableSort.key === col.key;
    var arrow = isSort ? (tableSort.asc ? ' ↑' : ' ↓') : ' <span style="opacity:.25">↕</span>';
    headHtml += '<th style="cursor:pointer;user-select:none" onclick="sortTable(\'' + col.key + '\')">' + col.label + arrow + '</th>';
  }
  document.getElementById('tableHead').innerHTML = headHtml;

  // build rows
  var rows = [];
  for (var i = 0; i < ck.length; i++) {
    var c = ck[i];
    var d = calcExtended(cm[c]);
    rows.push({ch: c, data: d});
  }

  // sort
  if (tableSort.key) {
    var sk = tableSort.key;
    var asc = tableSort.asc;
    rows.sort(function(a, b) {
      var av = a.data[sk] || 0;
      var bv = b.data[sk] || 0;
      return asc ? av - bv : bv - av;
    });
  }

  // tbody
  var html = '';
  for (var i = 0; i < rows.length; i++) {
    var c = rows[i].ch;
    var d = rows[i].data;
    // 노출과 전환수가 모두 0이면 숨김
    if ((d.impressions || 0) === 0 && (d.conversions || 0) === 0) continue;
    html += '<tr><td><span class="ch-pill ' + c + '">' + CH_NAME[c] + '</span></td>';
    for (var j = 0; j < activeCols.length; j++) {
      var col = activeCols[j];
      html += '<td>' + fmt(d[col.key], col.type) + '</td>';
    }
    html += '</tr>';
  }
  document.getElementById('tbody').innerHTML = html;
}

function sortTable(key) {
  if (tableSort.key === key) {
    tableSort.asc = !tableSort.asc;
  } else {
    tableSort.key = key;
    tableSort.asc = false; // default: 높은 값 먼저
  }
  var bk = brandKeys(), ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  renderTable(cm, ck);
}

function render() {
  var bk = brandKeys();
  var ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  var pm = sumData(bk, ck, PREV);
  renderKPIs(cm, pm);
  buildMetricSelector();
  renderChart(cm, ck);
  renderRoasCvr(cm, ck);
  renderTable(cm, ck);
}

function setBrand(btn) {

  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');

  document.getElementById('subRowHyper').style.display     = S.brand === 'hyper'     ? 'flex' : 'none';
  document.getElementById('subRowMynoxcel').style.display  = S.brand === 'minoxell'  ? 'flex' : 'none';
  var stabs = document.querySelectorAll('.sub-tab');
  for (var i = 0; i < stabs.length; i++) stabs[i].classList.toggle('active', stabs[i].getAttribute('data-sub') === 'all');
  tableSort = {key: null, asc: true};
  buildColDropdown();

function setSub(btn, brand) {
  var rowId = brand === 'skechers' ? 'subRowSkechers' : brand === 'minoxell' ? 'subRowMynoxcel' : 'subRowHyper';
  var stabs = document.querySelectorAll('#' + rowId + ' .sub-tab');
  for (var i = 0; i < stabs.length; i++) stabs[i].classList.remove('active');
  btn.classList.add('active');
  S.sub = btn.getAttribute('data-sub');
  renderWithData();
}

function setCh(btn) {
  var clicked = btn.getAttribute('data-ch');

  if (clicked === 'all') {
    // 전체 클릭 → 모두 해제하고 전체만 선택
    S.ch = ['all'];
  } else {
    // 개별 클릭
    var idx = S.ch.indexOf(clicked);
    var allIdx = S.ch.indexOf('all');

    if (allIdx !== -1) {
      // 전체 해제하고 클릭한 것만
      S.ch = [clicked];
    } else if (idx !== -1) {
      // 이미 선택된 거 클릭 → 해제 (최소 1개 유지)
      if (S.ch.length > 1) S.ch.splice(idx, 1);
    } else {
      // 새로 추가
      S.ch.push(clicked);
    }
  }

  // 탭 active 상태 업데이트
  var tabs = document.querySelectorAll('#chTabs .tab');
  for (var i = 0; i < tabs.length; i++) {
    var ch = tabs[i].getAttribute('data-ch');
    tabs[i].classList.toggle('active', S.ch.indexOf(ch) !== -1);
  }
  renderWithData();
}

function setThisMonth(btn) {

  btn.classList.add('active');

  yesterday.setDate(today.getDate() - 1);

function setLastMonth(btn) {
  var btns = document.querySelectorAll('.date-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  var today = new Date();

  sheetsCache.skechers = null; sheetsCache.minoxell = null; sheetsCache.hyper = null;

// 날짜 범위 localStorage 저장/복원
function saveDateRange() {
  try {
    localStorage.setItem('dashDateFrom', document.getElementById('dateFrom').value);
    localStorage.setItem('dashDateTo',   document.getElementById('dateTo').value);
  } catch(e) {}
}

function restoreDateRange() {
  try {
    var from = localStorage.getItem('dashDateFrom');
    var to   = localStorage.getItem('dashDateTo');
    if (from && to) {
      document.getElementById('dateFrom').value = from;
      document.getElementById('dateTo').value   = to;
      updateLabel();
      return true;
    }
  } catch(e) {}
  return false;
}

function setLastWeek(btn) {
  var btns = document.querySelectorAll('.date-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  var today = new Date();
  var day = today.getDay(); // 0=일, 1=월 ... 6=토
  // 이번주 월요일
  var thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - (day === 0 ? 7 : day) + 1);
  // 지난주 월요일 = 이번주 월요일 - 7
  var lastMonday = new Date(thisMonday);
  lastMonday.setDate(thisMonday.getDate() - 7);
  // 지난주 일요일 = 이번주 월요일 - 1

// CSV 한 줄 파싱
function splitCSVLine(line) {
  var cols = [], cur = '', inQuote = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseBudgetNum(str) {
  var clean = (str || '').replace(/₩/g,'').replace(/\s/g,'').replace(/,/g,'').replace(/[^0-9.]/g,'');
  return Number(clean) || 0;
}

// 새 시트 파싱: 헤더에서 월 컬럼 인덱스 찾아서 { storageKey: 월예산 } 반환
function parseBudgetSheet(text, targetMonth) {
  // targetMonth: '03' 형태
  var cleaned = '';
  var inQ = false;
  for (var ci = 0; ci < text.length; ci++) {
    var c = text[ci];
    if (c === '"') { inQ = !inQ; cleaned += c; }
    else if ((c === '\n' || c === '\r') && inQ) { cleaned += ' '; }
    else { cleaned += c; }
  }

  var lines = cleaned.trim().split('\n');
  if (lines.length < 2) return {};

  var headers = splitCSVLine(lines[0]);
  // 헤더: 브랜드,세부,매체,연간,12월,1월,2월,...
  // 월 컬럼 찾기: "1월"~"12월"
  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var targetLabel = monthNames[parseInt(targetMonth,10)-1];

  // 헤더에 같은 월 이름이 여러 번 나올 수 있으므로 마지막 인덱스 사용 (현재 연도)
  var monthIdx = -1;
  for (var h = 0; h < headers.length; h++) {
    if (headers[h].trim() === targetLabel) monthIdx = h;
  }
  if (monthIdx < 0) { console.warn('월 컬럼 못 찾음:', targetLabel, headers); return {}; }

  var out = {};
  var lastBrand = '', lastSub = '';

  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    var rawBrand = (cols[0] || '').trim();
    var rawSub   = (cols[1] || '').trim();
    var rawCh    = (cols[2] || '').trim();

    if (rawBrand) lastBrand = rawBrand;
    if (rawSub)   lastSub   = rawSub;
    else if (rawBrand) lastSub = ''; // 브랜드 바뀌면 세부 초기화

    var budget = parseBudgetNum(cols[monthIdx] || '');
    if (!budget || !lastBrand || !rawCh) continue;

    // BUDGET_BRAND_MAP에서 매칭
    for (var m = 0; m < BUDGET_BRAND_MAP.length; m++) {
      var rule = BUDGET_BRAND_MAP[m];
      if (rule.brand === lastBrand && rule.sub === lastSub && rule.ch === rawCh) {
        out[rule.key] = (out[rule.key] || 0) + budget;
        break;
      }
    }
  }
  return out;
}

function loadBudgetForMonth(ym, callback) {
  // 전체 시트를 한 번만 로드하고 캐시
  if (budgetCache.raw) {
    var parsed = parseBudgetSheet(budgetCache.raw, ym.slice(5,7));
    callback(parsed);
    return;
  }
  fetch(BUDGET_URL)
    .then(function(r){ return r.text(); })
    .then(function(text){
      budgetCache.raw = text;
      var parsed = parseBudgetSheet(text, ym.slice(5,7));
      callback(parsed);
    })
    .catch(function(){ callback({}); });
}

    var brandTotals = {};

    for (var i = 0; i < rows.length; i++) {

      if (isSubRow) {
        row += '<td style="padding:8px 16px"></td>';
        row += '<td style="padding:8px 16px;color:var(--text);font-weight:500;white-space:nowrap">' + label + '</td>';
        row += '<td style="padding:8px 16px;color:var(--muted);font-size:10px">소계</td>';
      } else {
        row += '<td style="padding:9px 16px;color:var(--text);font-weight:600;white-space:nowrap">' + brand + '</td>';
        row += '<td style="padding:9px 16px;color:var(--muted);font-size:10px">소계</td>';
        row += '<td style="padding:9px 16px"></td>';
      }
      row += '<td style="padding:9px 16px;text-align:right;font-weight:500">₩' + t.budget.toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + sc + ';font-weight:500">₩' + Math.round(t.spent).toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:var(--text);opacity:.75">₩' + t.plan.toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:5px 16px;text-align:right;min-width:90px"><div style="position:relative;height:22px;border-radius:4px;overflow:hidden;background:var(--bg3);min-width:80px"><div style="position:absolute;left:0;top:0;height:100%;width:' + fw + '%;background:' + fc + ';opacity:.3;border-radius:4px"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-weight:600;color:' + fc + '">' + pct.toFixed(1) + '%</div></div></td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + (rem < 0 ? 'var(--down)' : 'var(--text)') + ';font-weight:500">₩' + Math.round(rem).toLocaleString('ko-KR') + '</td>';
      row += '<td style="padding:9px 16px;text-align:right;color:' + (dg < 0 ? 'var(--down)' : 'var(--text)') + ';font-weight:500">' + (remainDays > 0 ? '₩' + dg.toLocaleString('ko-KR') : '-') + '</td>';
      row += '<td style="padding:9px 16px"></td>';
      row += '</tr>';
      return row;
    }

    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var budget    = r.monthBudget;
      var spent2    = r.spent;
      var plan      = totalDays > 0 ? Math.round(budget / totalDays * elapsedDays) : 0;
      var pctVal    = budget > 0 ? spent2 / budget * 100 : 0;
      var remain    = budget - spent2;
      var dailyGoal = remainDays > 0 ? Math.round(remain / remainDays) : 0;

      var fillColor = pctVal >= 100 ? '#ef4444' : pctVal >= 80 ? '#f97316' : '#22c55e';
      var fillWidth = Math.min(pctVal, 100).toFixed(1);

      var spentColor = 'var(--text)';
      if (plan > 0) {
        var diffPct = (spent2 - plan) / plan * 100;
        if (diffPct >= 5)       spentColor = 'var(--down)';
        else if (diffPct <= -5) spentColor = 'var(--google)';
      }

      // 브랜드 또는 하위 바뀌기 전에 소계 삽입
      if (lastBrandLabel) {
        var brandChanged = (r.brand !== lastBrandLabel);
        var subChanged   = !brandChanged && (r.sub !== lastSubLabel);
        var needsSubTotal = BRANDS_WITH_SUBTOTALS.indexOf(lastBrandLabel) !== -1;

        if (brandChanged) {
          // 하위 소계가 필요한 브랜드면 마지막 하위 소계 먼저
          if (needsSubTotal && lastSubLabel) {
            html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
          }
          // 브랜드 소계
          html += renderSubtotalRow(lastBrandLabel, '', brandTotals[lastBrandLabel], false);
        } else if (subChanged && needsSubTotal) {
          // 같은 브랜드 내 하위 바뀔 때 하위 소계
          html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
        }
      }

      var showBrand = (r.brand !== lastBrandLabel);
      var showSub   = (r.brand + '__' + r.sub !== lastBrandLabel + '__' + lastSubLabel);
      lastBrandLabel = r.brand;
      lastSubLabel   = r.sub;

      html += '<tr style="border-bottom:1px solid var(--border)">';
      html += '<td style="padding:11px 16px;color:var(--text);white-space:nowrap;font-weight:' + (showBrand ? '500' : '400') + '">' + (showBrand ? r.brand : '') + '</td>';
      html += '<td style="padding:11px 16px;color:var(--text);opacity:.75;line-height:1.4">' + (showSub ? r.sub : '') + '</td>';
      html += '<td style="padding:11px 16px;color:var(--text);opacity:.7;white-space:nowrap">' + r.ch + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:var(--text)">₩' + budget.toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + spentColor + ';font-weight:500">₩' + Math.round(spent2).toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:var(--text);opacity:.75">₩' + plan.toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:7px 16px;text-align:right;min-width:90px">';
      html += '<div style="position:relative;height:22px;border-radius:4px;overflow:hidden;background:var(--bg3);min-width:80px">';
      html += '<div style="position:absolute;left:0;top:0;height:100%;width:' + fillWidth + '%;background:' + fillColor + ';opacity:.25;border-radius:4px"></div>';
      html += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-weight:500;color:' + fillColor + '">' + pctVal.toFixed(1) + '%</div>';
      html += '</div></td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + (remain < 0 ? 'var(--down)' : 'var(--text)') + '">₩' + Math.round(remain).toLocaleString('ko-KR') + '</td>';
      html += '<td style="padding:11px 16px;text-align:right;color:' + (dailyGoal < 0 ? 'var(--down)' : 'var(--text)') + '">' + (remainDays > 0 ? '₩' + dailyGoal.toLocaleString('ko-KR') : '-') + '</td>';

      // 수수료 제외 소진 목표액(일)
      var netDailyGoal = dailyGoal;
      var feeR = FEE_RATES[r.storageKey] || 0;
      if (feeR > 0) netDailyGoal = Math.round(dailyGoal / (1 + feeR));
      html += '<td style="padding:11px 16px;text-align:right;color:' + (netDailyGoal < 0 ? 'var(--down)' : 'var(--muted)') + '">' + (remainDays > 0 ? '₩' + netDailyGoal.toLocaleString('ko-KR') : '-') + '</td>';

      html += '</tr>';
    }
    // 마지막 브랜드 소계
    if (lastBrandLabel) {
      if (BRANDS_WITH_SUBTOTALS.indexOf(lastBrandLabel) !== -1 && lastSubLabel) {
        html += renderSubtotalRow(lastBrandLabel, lastSubLabel, subTotals[lastBrandLabel + '__' + lastSubLabel], true);
      }
      html += renderSubtotalRow(lastBrandLabel, '', brandTotals[lastBrandLabel], false);
    }
    html += '</table></div>';
    barsEl.innerHTML = html;
}

// 예산 소진 현황 토글
var budgetSectionOpen = false;
function toggleBudgetSection() {
  budgetSectionOpen = !budgetSectionOpen;
  var bars   = document.getElementById('budgetBars');
  var arrow  = document.getElementById('budgetArrow');
  bars.style.display = budgetSectionOpen ? 'flex' : 'none';
  arrow.style.transform = budgetSectionOpen ? 'rotate(0deg)' : 'rotate(-90deg)';
  if (budgetSectionOpen) renderBudgetSection();
}

// 예산 입력 버튼 숨기기 (Sheets에서 읽어오므로 불필요)
function toggleBudgetEdit() {}
function saveBudget() {}

buildMetricSelector();
buildColDropdown();
buildBudgetPeriodSelector();
restoreDateRange();
renderWithData();
</script>
